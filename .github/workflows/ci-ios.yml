name: iOS CI

on:
  workflow_call:
    outputs:
      coverage:
        description: 'iOS coverage percentage'
        value: ${{ jobs.build-and-test.outputs.coverage }}
  workflow_dispatch:

jobs:
  build-and-test:
    outputs:
      coverage: ${{ steps.ios-coverage.outputs.ios_coverage }}
    name: iOS Build & Test
    runs-on: macos-15  # macOS with Xcode 16+
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          # Use Xcode 16+ which supports iOS 17.0+
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List Available Simulators
        run: |
          echo "=== Available iOS Simulators ==="
          xcrun simctl list devices available | head -50
          echo ""
          echo "=== Looking for iPhone simulators ==="
          xcrun simctl list devices available | grep -E "iPhone (15|16)" | head -10 || echo "No iPhone 15/16 simulators found"

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build iOS app
        working-directory: ios/JustSpent
        run: |
          # Use iPhone 15 Pro which is widely available on macOS-15 runners
          # Using specific iOS version instead of 'latest' to avoid version mismatch
          xcodebuild clean build \
            -project JustSpent.xcodeproj \
            -scheme JustSpent \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit 1

      - name: Run All Tests with Coverage
        working-directory: ios/JustSpent
        run: |
          # Run ALL tests without -only-testing flag to properly instrument the app target for coverage
          # IMPORTANT: This must be run FIRST before any -only-testing runs, as coverage data requires
          # the app to be built with coverage instrumentation enabled for all targets
          rm -rf ./test-results.xcresult
          xcodebuild test \
            -project JustSpent.xcodeproj \
            -scheme JustSpent \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -enableCodeCoverage YES \
            -resultBundlePath ./test-results.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/JustSpent/test-results.xcresult

      - name: Extract Coverage Report from xcresult
        if: always()
        working-directory: ios/JustSpent
        run: |
          # Extract coverage data from the combined test results bundle
          echo "=== Extracting iOS coverage from xcresult ==="

          # Create coverage directory
          mkdir -p coverage-report

          # Use the result bundle from the full test run (no -only-testing flag)
          COVERAGE_BUNDLE="test-results.xcresult"

          # Debug: List all xcresult bundles (including in temp directories)
          echo "Looking for xcresult bundles..."
          ls -la *.xcresult 2>/dev/null || echo "No xcresult bundles found in current directory"

          # Check if the coverage bundle exists
          if [ ! -d "$COVERAGE_BUNDLE" ]; then
            echo "⚠️  Coverage bundle $COVERAGE_BUNDLE not found"
            echo "Looking for any xcresult bundles..."
            find . -name "*.xcresult" -type d 2>/dev/null | head -5
            COVERAGE_PCT="0.0"
          else
            echo "Found coverage bundle: $COVERAGE_BUNDLE"
            ls -la "$COVERAGE_BUNDLE"

            # Check what's inside the bundle
            echo "Bundle contents:"
            ls -la "$COVERAGE_BUNDLE/" 2>/dev/null || true

            # Extract coverage report as JSON from the bundle
            xcrun xccov view --report --json "$COVERAGE_BUNDLE" > coverage-report/coverage.json 2>&1 || {
              echo "⚠️  Failed to extract coverage from $COVERAGE_BUNDLE"
              cat coverage-report/coverage.json 2>/dev/null || true
            }

            # Generate human-readable summary
            echo "=== iOS Coverage Summary ==="
            xcrun xccov view --report "$COVERAGE_BUNDLE" 2>&1 | head -50 || echo "Coverage summary not available"

            # Extract overall coverage percentage for PR comment
            COVERAGE_PCT=$(xcrun xccov view --report --json "$COVERAGE_BUNDLE" 2>/dev/null | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              # Get line coverage from targets
              if 'targets' in data:
                  for target in data['targets']:
                      if target.get('name', '').endswith('.app'):
                          pct = target.get('lineCoverage', 0) * 100
                          print(f'{pct:.1f}')
                          sys.exit(0)
              # Fallback to overall lineCoverage
              pct = data.get('lineCoverage', 0) * 100
              print(f'{pct:.1f}')
          except:
              print('0.0')
          " || echo "0.0")
          fi

          echo "iOS Coverage: ${COVERAGE_PCT}%"
          echo "ios_coverage=${COVERAGE_PCT}" >> $GITHUB_OUTPUT
        id: ios-coverage

      - name: Upload iOS Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-coverage-report
          path: ios/JustSpent/coverage-report/

      - name: Upload Test Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-logs
          path: |
            ~/Library/Logs/DiagnosticReports/
            ~/Library/Developer/Xcode/DerivedData/*/Logs/Test/
